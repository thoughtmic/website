<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <title>ThoughtMic menu bar template — A</title>
  <desc>Simplified monochrome mic silhouette for 16x16 menu bar rendering. Mic head + body + a single asymmetric flow tick to the right so it reads as "mic with output," not as a cross.</desc>

  <!-- Mic head (solid dot, top-heavy) -->
  <circle cx="6.5" cy="4" r="3" fill="currentColor"/>

  <!-- Mic body / stem, short and chunky so it survives scaling -->
  <rect x="5.25" y="6.5" width="2.5" height="5.5" rx="1.25" ry="1.25" fill="currentColor"/>

  <!-- Base of the mic stand -->
  <rect x="3.5" y="12" width="6" height="1.5" rx="0.75" ry="0.75" fill="currentColor"/>

  <!-- Directional flow tick to the right (graph edge) — the differentiator that makes this not a generic mic -->
  <rect x="10.5" y="7.5" width="4" height="1.5" rx="0.75" ry="0.75" fill="currentColor"/>
  <circle cx="14.5" cy="8.25" r="1.25" fill="currentColor"/>
</svg>
