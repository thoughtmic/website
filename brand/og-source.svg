<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background — warm paper -->
  <rect x="0" y="0" width="1200" height="630" fill="#F6F3EC"/>

  <!-- Subtle texture band -->
  <rect x="0" y="0" width="1200" height="4" fill="#1B1A17" opacity="0.08"/>
  <rect x="0" y="626" width="1200" height="4" fill="#1B1A17" opacity="0.08"/>

  <!-- Icon area: brain outline with waveform, positioned left -->
  <g transform="translate(80, 115) scale(0.39)">
    <rect x="0" y="0" width="1024" height="1024" rx="185" ry="185" fill="#FFFFFF"/>
    <path d="M 180 540
             C 180 360, 300 220, 420 260
             C 460 280, 490 320, 512 360
             C 534 320, 564 280, 604 260
             C 724 220, 844 360, 844 540
             C 844 720, 724 800, 512 800
             C 300 800, 180 720, 180 540 Z"
          fill="none" stroke="#1B1A17" stroke-width="56" stroke-linejoin="round" stroke-linecap="round"/>
    <rect x="368" y="500" width="48" height="160" rx="24" fill="#1B1A17"/>
    <rect x="432" y="440" width="48" height="280" rx="24" fill="#1B1A17"/>
    <rect x="496" y="400" width="48" height="360" rx="24" fill="#457261"/>
    <rect x="560" y="440" width="48" height="280" rx="24" fill="#1B1A17"/>
    <rect x="624" y="500" width="48" height="160" rx="24" fill="#1B1A17"/>
  </g>

  <!-- Right-side text — wordmark + tagline + proof strip -->
  <g font-family="-apple-system, 'SF Pro Display', Helvetica, Arial, sans-serif">
    <!-- Wordmark -->
    <text x="540" y="260"
          font-size="92"
          font-weight="800"
          fill="#1B1A17"
          letter-spacing="-3">ThoughtMic</text>

    <!-- Tagline -->
    <text x="540" y="340"
          font-size="44"
          font-weight="500"
          fill="#1B1A17"
          letter-spacing="-1">Speak your second brain.</text>

    <!-- Proof / compat strip -->
    <text x="540" y="420"
          font-size="24"
          font-weight="500"
          fill="#6B665C"
          letter-spacing="0">Obsidian  ·  Logseq  ·  any Markdown folder</text>

    <!-- Local-first stamp -->
    <g transform="translate(540, 470)">
      <rect x="0" y="0" width="220" height="48" rx="24" fill="#1B1A17"/>
      <text x="110" y="32"
            font-size="18"
            font-weight="700"
            fill="#F6F3EC"
            letter-spacing="1"
            text-anchor="middle">100% ON-DEVICE</text>
    </g>
  </g>
</svg>
