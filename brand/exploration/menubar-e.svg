<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <title>ThoughtMic menu bar template — E</title>
  <desc>Voice-to-graph at 16px: a filled circle at top (mic/source) connected by two diagonal lines to two bottom dots, triangle closed by a horizontal edge.</desc>

  <!-- Edges -->
  <g stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none">
    <line x1="8"    y1="5.5" x2="3.25" y2="12"/>
    <line x1="8"    y1="5.5" x2="12.75" y2="12"/>
    <line x1="3.25" y1="12"  x2="12.75" y2="12"/>
  </g>

  <!-- Nodes: top is the mic/source (larger), two smaller dots at the bottom -->
  <circle cx="8"    cy="4.5" r="2.4" fill="currentColor"/>
  <circle cx="3.25" cy="12"  r="1.6" fill="currentColor"/>
  <circle cx="12.75" cy="12" r="1.6" fill="currentColor"/>
</svg>
