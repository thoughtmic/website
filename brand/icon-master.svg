<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>ThoughtMic Icon — Variant D v4: Refined brain + waveform</title>
  <desc>Smoother brain silhouette. Lateral bumps removed; one clean arc per side. Pronounced V-dip at the top center carries the "brain" read. Larger waveform inside as the dominant interior element.</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1024" height="1024" rx="185" ry="185" fill="#F6F3EC"/>

  <!-- Brain outline: 6 curve segments, one per section.
       Each curve is a single clean arc (no mid-side bumps, no droop).
       V-dip at the top is deeper (y 260 → 360 → 260) so the two hemispheres read clearly. -->
  <path d="M 180 540
           C 180 360, 300 220, 420 260
           C 460 280, 490 320, 512 360
           C 534 320, 564 280, 604 260
           C 724 220, 844 360, 844 540
           C 844 720, 724 800, 512 800
           C 300 800, 180 720, 180 540 Z"
        fill="none"
        stroke="#1B1A17"
        stroke-width="56"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Voice waveform inside: bigger, centered on brain's interior midpoint (~y=580).
       Center bar in terracotta accent. -->
  <g>
    <rect x="368" y="500" width="48" height="160" rx="24" ry="24" fill="#1B1A17"/>
    <rect x="432" y="440" width="48" height="280" rx="24" ry="24" fill="#1B1A17"/>
    <rect x="496" y="400" width="48" height="360" rx="24" ry="24" fill="#457261"/>
    <rect x="560" y="440" width="48" height="280" rx="24" ry="24" fill="#1B1A17"/>
    <rect x="624" y="500" width="48" height="160" rx="24" ry="24" fill="#1B1A17"/>
  </g>
</svg>
